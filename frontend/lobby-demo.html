<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby Demo - PSO Brasil</title>
    <style>
        :root {
            --neon-green: #22C55E;
            --pure-black: #000000;
            --dark-gray: #121212;
            --text-light: #E5E7EB;
            --text-gray: #9CA3AF;
        }
        
        body {
            background: var(--pure-black);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
        }
        
        /* Lobby Notification */
        .lobby-notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: linear-gradient(135deg, #0a2a0a 0%, #051405 100%);
            border: 1px solid var(--neon-green);
            border-left: 4px solid var(--neon-green);
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
            z-index: 999;
            max-width: 400px;
            display: none;
            animation: slideInLeft 0.3s ease;
        }
        
        .lobby-notification.active {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .lobby-icon {
            width: 40px;
            height: 40px;
            background: var(--neon-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--pure-black);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
        }
        
        .lobby-content { flex: 1; }
        
        .lobby-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }
        
        .lobby-text { font-size: 13px; color: var(--text-light); line-height: 1.4; }
        
        .lobby-close {
            background: transparent;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            padding: 4px;
            font-size: 18px;
        }
        
        .lobby-close:hover { color: var(--neon-green); }
    </style>
</head>
<body>
    <h1 style="padding: 40px;">Lobby System Demo</h1>
    
    <!-- Lobby Notification -->
    <div id="lobbyNotification" class="lobby-notification">
        <div class="lobby-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
        </div>
        <div class="lobby-content">
            <div class="lobby-title">LOBBY ATIVO</div>
            <div class="lobby-text" id="lobbyText">Carregando...</div>
        </div>
        <button class="lobby-close" onclick="closeLobby()">×</button>
    </div>

    <script>
        // Lobby System
        let lobbyPlayers = [];
        let currentIndex = 0;
        let carouselInterval = null;

        async function loadLobby() {
            try {
                const response = await fetch('/api/lobby');
                const data = await response.json();
                
                if (data.success && data.count > 0) {
                    lobbyPlayers = data.players;
                    showLobby();
                    startCarousel();
                } else {
                    hideLobby();
                }
            } catch (error) {
                console.error('Erro ao carregar lobby:', error);
            }
        }

        function showLobby() {
            const notification = document.getElementById('lobbyNotification');
            notification.classList.add('active');
            updateLobbyText();
        }

        function hideLobby() {
            const notification = document.getElementById('lobbyNotification');
            notification.classList.remove('active');
            stopCarousel();
        }

        function updateLobbyText() {
            if (lobbyPlayers.length === 0) return;
            
            const player = lobbyPlayers[currentIndex];
            const text = document.getElementById('lobbyText');
            text.textContent = `${player.username} está procurando time para jogar de ${player.posicao}!`;
        }

        function startCarousel() {
            if (lobbyPlayers.length <= 1) return;
            
            stopCarousel();
            carouselInterval = setInterval(() => {
                currentIndex = (currentIndex + 1) % lobbyPlayers.length;
                updateLobbyText();
            }, 5000);
        }

        function stopCarousel() {
            if (carouselInterval) {
                clearInterval(carouselInterval);
                carouselInterval = null;
            }
        }

        function closeLobby() {
            hideLobby();
        }

        // Atualizar a cada 30 segundos
        setInterval(loadLobby, 30000);
        
        // Carregar inicialmente
        loadLobby();
    </script>
</body>
</html>
