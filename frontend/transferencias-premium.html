<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferências Premium - PSO Brasil</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React e Dependências -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10/dist/framer-motion.min.js"></script>
    
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <!-- Estilos Personalizados Premium -->
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #05070A;
            overflow-x: hidden;
        }
        
        /* Premium Glassmorphism */
        .glass-card-premium {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            box-shadow: 
                0 8px 32px rgba(0, 209, 255, 0.1),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .glass-card-cyan {
            background: linear-gradient(135deg, rgba(0, 209, 255, 0.05), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 209, 255, 0.2);
            border-radius: 1.5rem;
            box-shadow: 
                0 8px 32px rgba(0, 209, 255, 0.2),
                0 0 0 1px rgba(0, 209, 255, 0.3),
                inset 0 1px 0 rgba(0, 209, 255, 0.2);
        }
        
        .glass-card-gold {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.05), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 1.5rem;
            box-shadow: 
                0 8px 32px rgba(255, 215, 0, 0.2),
                0 0 0 1px rgba(255, 215, 0, 0.3),
                inset 0 1px 0 rgba(255, 215, 0, 0.2);
        }
        
        /* Gradiente de fundo premium */
        .gradient-bg-premium {
            background: linear-gradient(135deg, #05070A 0%, #0A0F1A 25%, #05070A 50%, #0A0F1A 75%, #05070A 100%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
        }
        
        .gradient-overlay-premium {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(0, 209, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at calc(100% - var(--mouse-x, 50%)) calc(100% - var(--mouse-y, 50%)), rgba(255, 215, 0, 0.02) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }
        
        .content-premium {
            position: relative;
            z-index: 10;
        }
        
        /* Animações Premium */
        .premium-fade-in {
            animation: premiumFadeIn 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes premiumFadeIn {
            0% { 
                opacity: 0; 
                transform: translateY(40px) scale(0.95);
                filter: blur(10px);
            }
            50% {
                opacity: 0.5;
                transform: translateY(20px) scale(0.98);
                filter: blur(5px);
            }
            100% { 
                opacity: 1; 
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }
        
        .tier-1-glow-premium {
            box-shadow: 
                0 0 60px rgba(255, 215, 0, 0.4),
                0 0 0 2px rgba(255, 215, 0, 0.3),
                inset 0 0 30px rgba(255, 215, 0, 0.1);
        }
        
        .tier-1-animation-premium {
            animation: tier1PulsePremium 4s infinite;
        }
        
        @keyframes tier1PulsePremium {
            0%, 100% { 
                box-shadow: 
                    0 0 60px rgba(255, 215, 0, 0.4),
                    0 0 0 2px rgba(255, 215, 0, 0.3);
            }
            50% { 
                box-shadow: 
                    0 0 80px rgba(255, 215, 0, 0.6),
                    0 0 0 3px rgba(255, 215, 0, 0.5);
            }
        }
        
        .new-badge-premium {
            animation: newBadgePulsePremium 3s infinite;
            background: linear-gradient(135deg, #00D1FF, #FFD700);
        }
        
        @keyframes newBadgePulsePremium {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 20px rgba(0, 209, 255, 0.5);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
            }
        }
        
        /* Efeitos de hover premium */
        .premium-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .premium-hover:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 
                0 20px 60px rgba(0, 209, 255, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.1);
        }
        
        /* Texturas e efeitos */
        .premium-text {
            background: linear-gradient(135deg, #ffffff, #00D1FF, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .gold-text {
            background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Bordas premium */
        .premium-border-cyan {
            border: 2px solid transparent;
            background: linear-gradient(135deg, rgba(0, 209, 255, 0.1), rgba(255, 255, 255, 0.05)) padding-box,
                        linear-gradient(135deg, #00D1FF, #00D1FF) border-box;
        }
        
        .premium-border-gold {
            border: 2px solid transparent;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 255, 255, 0.05)) padding-box,
                        linear-gradient(135deg, #FFD700, #FFA500) border-box;
        }
        
        /* Loading premium */
        .premium-loader {
            background: conic-gradient(from 0deg, #00D1FF, #FFD700, #00D1FF);
            animation: premiumSpin 2s linear infinite;
        }
        
        @keyframes premiumSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Partículas flutuantes */
        .floating-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
    </style>
</head>
<body>
    <div class="gradient-bg-premium"></div>
    <div class="gradient-overlay-premium"></div>
    
    <!-- Partículas flutuantes -->
    <div id="particles-container"></div>
    
    <div class="content-premium" id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        // Componente TransferMarket Premium
        const TransferMarketPremium = () => {
            const [transfers, setTransfers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [stats, setStats] = useState(null);
            const [viewMode, setViewMode] = useState('timeline');
            const [socket, setSocket] = useState(null);
            const [securityStatus, setSecurityStatus] = useState('verified');
            
            // Ref para partículas
            const particlesRef = useRef(null);

            // Gerar partículas flutuantes
            useEffect(() => {
                const container = document.getElementById('particles-container');
                if (!container) return;
                
                const createParticle = () => {
                    const particle = document.createElement('div');
                    particle.className = 'floating-particle';
                    
                    const size = Math.random() * 4 + 2;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    
                    particle.style.left = `${Math.random() * 100}%`;
                    particle.style.top = `${Math.random() * 100}%`;
                    
                    particle.style.background = Math.random() > 0.5 
                        ? 'rgba(0, 209, 255, 0.3)' 
                        : 'rgba(255, 215, 0, 0.3)';
                    
                    particle.style.animationDelay = `${Math.random() * 6}s`;
                    particle.style.animationDuration = `${6 + Math.random() * 4}s`;
                    
                    container.appendChild(particle);
                    
                    // Remover partícula após animação
                    setTimeout(() => {
                        particle.remove();
                    }, 10000);
                };
                
                // Criar partículas iniciais
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => createParticle(), i * 200);
                }
                
                // Criar novas partículas periodicamente
                const interval = setInterval(createParticle, 2000);
                
                return () => clearInterval(interval);
            }, []);

            // Buscar transferências com segurança
            const fetchTransfers = async () => {
                try {
                    setLoading(true);
                    setError(null);

                    const response = await fetch('/api/transfers?limit=50', {
                        headers: {
                            'X-Requested-With': 'XMLHttpRequest',
                            'X-Security-Token': generateSecurityToken()
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    
                    if (!data.success) {
                        throw new Error(data.message || 'Erro ao buscar transferências');
                    }
                    
                    // Verificar integridade dos dados
                    const verifiedData = verifyDataIntegrity(data);
                    if (!verifiedData.valid) {
                        throw new Error('Integridade dos dados comprometida');
                    }
                    
                    setTransfers(data.data.transfers);
                    setStats(data.data.stats);
                    setSecurityStatus('verified');
                    
                } catch (err) {
                    console.error('Erro ao buscar transferências:', err);
                    setError(err.message);
                    setSecurityStatus('compromised');
                } finally {
                    setLoading(false);
                }
            };

            // Gerar token de segurança
            const generateSecurityToken = () => {
                const timestamp = Date.now().toString();
                const random = Math.random().toString(36).substring(2);
                return btoa(`${timestamp}-${random}`);
            };

            // Verificar integridade dos dados
            const verifyDataIntegrity = (data) => {
                try {
                    // Verificar se há assinatura de segurança
                    if (data.security && data.security.integrity === 'verified') {
                        return { valid: true };
                    }
                    
                    // Verificação básica de estrutura
                    if (data.success && Array.isArray(data.data?.transfers)) {
                        return { valid: true };
                    }
                    
                    return { valid: false, error: 'Estrutura de dados inválida' };
                } catch (error) {
                    return { valid: false, error: error.message };
                }
            };

            // WebSocket com segurança
            useEffect(() => {
                const newSocket = io('http://localhost:3000', {
                    auth: {
                        token: generateSecurityToken()
                    }
                });
                
                newSocket.on('connect', () => {
                    console.log('Conectado ao WebSocket seguro de transferências');
                    setSecurityStatus('connected');
                });

                newSocket.on('new-transfer', (data) => {
                    console.log('Nova transferência recebida:', data);
                    
                    // Verificar integridade da transferência
                    if (verifyDataIntegrity({ data: { transfers: [data.transfer] } }).valid) {
                        setTransfers(prev => [data.transfer, ...prev.slice(0, 49)]);
                        setSecurityStatus('verified');
                    } else {
                        setSecurityStatus('compromised');
                        console.warn('Transferência recebida com integridade comprometida');
                    }
                });

                newSocket.on('disconnect', () => {
                    console.log('Desconectado do WebSocket');
                    setSecurityStatus('disconnected');
                });

                newSocket.on('error', (error) => {
                    console.error('Erro no WebSocket:', error);
                    setSecurityStatus('error');
                });

                setSocket(newSocket);
                fetchTransfers();

                return () => newSocket.close();
            }, []);

            // Animações premium
            const containerVariants = {
                hidden: { opacity: 0 },
                visible: {
                    opacity: 1,
                    transition: {
                        staggerChildren: 0.15,
                        delayChildren: 0.2
                    }
                }
            };

            const itemVariants = {
                hidden: { 
                    opacity: 0, 
                    y: 40, 
                    scale: 0.9,
                    filter: 'blur(10px)'
                },
                visible: { 
                    opacity: 1, 
                    y: 0, 
                    scale: 1,
                    filter: 'blur(0px)',
                    transition: { 
                        type: 'spring', 
                        damping: 20, 
                        stiffness: 300,
                        duration: 0.8
                    }
                }
            };

            // Animação Tier 1 Premium
            const tier1Variants = {
                hidden: { 
                    opacity: 0, 
                    y: 60, 
                    scale: 0.85,
                    rotate: -8,
                    filter: 'blur(15px)'
                },
                visible: { 
                    opacity: 1, 
                    y: 0, 
                    scale: 1,
                    rotate: 0,
                    filter: 'blur(0px)',
                    transition: { 
                        type: 'spring', 
                        damping: 12, 
                        stiffness: 400,
                        duration: 1.2
                    }
                }
            };

            // Componente de card premium
            const TransferCardPremium = ({ transfer, index, isTier1 = false }) => {
                const isNew = transfer.isRecent;
                const isFreeAgent = transfer.isFreeAgent;
                
                return (
                    <motion.div
                        key={transfer.id}
                        variants={isTier1 ? tier1Variants : itemVariants}
                        className="relative"
                    >
                        <div className={`glass-card-premium premium-hover p-8 ${isTier1 ? 'tier-1-glow-premium' : ''}`}>
                            {/* Selo de Novo Premium */}
                            <AnimatePresence>
                                {isNew && (
                                    <motion.div
                                        initial={{ scale: 0, rotate: -180 }}
                                        animate={{ scale: 1, rotate: 0 }}
                                        exit={{ scale: 0, rotate: 180 }}
                                        className="absolute -top-3 -right-3 new-badge-premium text-white text-xs px-4 py-2 rounded-full font-bold flex items-center space-x-2"
                                    >
                                        <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921.003 1.603.921 1.902 0z" />
                                        </svg>
                                        <span>NOVO</span>
                                    </motion.div>
                                )}
                            </AnimatePresence>

                            {/* Selo de Tier 1 Premium */}
                            <AnimatePresence>
                                {isTier1 && (
                                    <motion.div
                                        initial={{ scale: 0 }}
                                        animate={{ scale: 1 }}
                                        className="absolute -top-3 -left-3 glass-card-gold text-white text-xs px-4 py-2 rounded-full font-bold flex items-center space-x-2"
                                    >
                                        <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921.003 1.603.921 1.902 0z" />
                                        </svg>
                                        <span className="gold-text">TIER 1</span>
                                    </motion.div>
                                )}
                            </AnimatePresence>

                            {/* Status de Segurança */}
                            <div className="absolute top-3 right-3 flex items-center space-x-2">
                                <div className={`w-2 h-2 rounded-full ${
                                    securityStatus === 'verified' ? 'bg-green-500' :
                                    securityStatus === 'compromised' ? 'bg-red-500' :
                                    securityStatus === 'connected' ? 'bg-blue-500' :
                                    'bg-gray-500'
                                }`} />
                                <span className="text-xs text-gray-400">
                                    {securityStatus === 'verified' ? 'Seguro' :
                                     securityStatus === 'compromised' ? 'Comprometido' :
                                     securityStatus === 'connected' ? 'Conectado' :
                                     'Offline'}
                                </span>
                            </div>

                            {/* Conteúdo Premium */}
                            <div className="space-y-6">
                                {/* Anúncio Principal */}
                                <div className="text-center">
                                    <motion.h2
                                        initial={{ opacity: 0, y: 10 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 0.3 }}
                                        className="text-2xl font-bold premium-text mb-3"
                                    >
                                        {transfer.announcement}
                                    </motion.h2>
                                </div>

                                {/* Transferência Visual */}
                                <div className="flex items-center justify-between">
                                    {/* Clube Antigo */}
                                    <div className="flex flex-col items-center space-y-3">
                                        {isFreeAgent ? (
                                            <div className="w-20 h-20 bg-gradient-to-br from-gray-700 to-gray-800 rounded-2xl flex items-center justify-center border border-gray-600">
                                                <svg className="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                                </svg>
                                            </div>
                                        ) : (
                                            <div className="w-20 h-20 bg-gradient-to-br from-red-600/20 to-orange-600/20 rounded-2xl flex items-center justify-center border border-red-500/40">
                                                {transfer.oldClub?.logoUrl ? (
                                                    <img 
                                                        src={transfer.oldClub.logoUrl} 
                                                        alt={transfer.oldClub.name}
                                                        className="w-16 h-16 object-contain"
                                                        onError={(e) => {
                                                            e.target.style.display = 'none';
                                                            e.target.nextElementSibling.style.display = 'flex';
                                                        }}
                                                    />
                                                ) : null}
                                                <svg className={`w-10 h-10 text-red-400 ${transfer.oldClub?.logoUrl ? 'hidden' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                                </svg>
                                            </div>
                                        )}
                                        <span className="text-sm text-gray-300 text-center max-w-[100px] truncate font-medium">
                                            {isFreeAgent ? 'VLOCE' : transfer.oldClub?.name}
                                        </span>
                                    </div>

                                    {/* Seta Premium */}
                                    <div className="flex flex-col items-center space-y-2">
                                        <motion.div
                                            animate={{ x: [0, 8, 0] }}
                                            transition={{ repeat: Infinity, duration: 3, ease: "easeInOut" }}
                                            className="text-3xl text-cyan-400"
                                        >
                                            <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M13 7l5 5m0 0l-5 5m5-5H6" />
                                            </svg>
                                        </motion.div>
                                        <span className="text-xs text-gray-400 font-medium">Transferência</span>
                                    </div>

                                    {/* Novo Clube */}
                                    <div className="flex flex-col items-center space-y-3">
                                        <div className="w-20 h-20 bg-gradient-to-br from-green-600/20 to-cyan-600/20 rounded-2xl flex items-center justify-center border border-green-500/40">
                                            {transfer.newClub?.logoUrl ? (
                                                <img 
                                                    src={transfer.newClub.logoUrl} 
                                                    alt={transfer.newClub.name}
                                                    className="w-16 h-16 object-contain"
                                                    onError={(e) => {
                                                        e.target.style.display = 'none';
                                                        e.target.nextElementSibling.style.display = 'flex';
                                                    }}
                                                />
                                            ) : null}
                                            <svg className={`w-10 h-10 text-green-400 ${transfer.newClub?.logoUrl ? 'hidden' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                        </div>
                                        <span className="text-sm text-gray-300 text-center max-w-[100px] truncate font-medium">
                                            {transfer.newClub?.name}
                                        </span>
                                    </div>
                                </div>

                                {/* Detalhes do Contrato Premium */}
                                <div className="grid grid-cols-2 gap-6 text-sm">
                                    <div className="flex items-center space-x-3">
                                        <div className="w-10 h-10 bg-gradient-to-br from-cyan-500/20 to-blue-500/20 rounded-lg flex items-center justify-center border border-cyan-500/40">
                                            <svg className="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2zm0 8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v8a2 2 0 002 2h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                        </div>
                                        <div>
                                            <p className="text-gray-400 text-xs">Salário</p>
                                            <p className="text-white font-bold text-lg">{transfer.formattedSalary}</p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex items-center space-x-3">
                                        <div className="w-10 h-10 bg-gradient-to-br from-cyan-500/20 to-blue-500/20 rounded-lg flex items-center justify-center border border-cyan-500/40">
                                            <svg className="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                                            </svg>
                                        </div>
                                        <div>
                                            <p className="text-gray-400 text-xs">Taxa</p>
                                            <p className="text-white font-bold text-lg">{transfer.formattedFee}</p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex items-center space-x-3">
                                        <div className="w-10 h-10 bg-gradient-to-br from-yellow-500/20 to-orange-500/20 rounded-lg flex items-center justify-center border border-yellow-500/40">
                                            <svg className="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4l3-3m0 6l3-3m-3 6h6" />
                                            </svg>
                                        </div>
                                        <div>
                                            <p className="text-gray-400 text-xs">Duração</p>
                                            <p className="text-white font-bold text-lg">{transfer.duration} meses</p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex items-center space-x-3">
                                        <div className="w-10 h-10 bg-gradient-to-br from-yellow-500/20 to-orange-500/20 rounded-lg flex items-center justify-center border border-yellow-500/40">
                                            <svg className="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9.476-6.031 9.476-11.622 0-1.048-.083-2.08-.249-3.07-.48z" />
                                            </svg>
                                        </div>
                                        <div>
                                            <p className="text-gray-400 text-xs">Cláusula</p>
                                            <p className="text-white font-bold text-lg">{transfer.formattedReleaseClause}</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Rodapé Premium */}
                                <div className="flex items-center justify-between pt-6 border-t border-white/10">
                                    <div className="flex items-center space-x-3">
                                        <div className="w-6 h-6 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-full flex items-center justify-center">
                                            <svg className="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20">
                                                <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" />
                                                <path fillRule="evenodd" d="M4 5a2 2 0 012-2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V5a2 2 0 012-2h2a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V5z" clipRule="evenodd" />
                                            </svg>
                                        </div>
                                        <span className="text-xs text-gray-400">Contrato</span>
                                        <span className="text-xs text-cyan-400 font-mono">{transfer.contractId}</span>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <div className={`w-2 h-2 rounded-full ${
                                            securityStatus === 'verified' ? 'bg-green-500' :
                                            securityStatus === 'compromised' ? 'bg-red-500' :
                                            'bg-gray-500'
                                        }`} />
                                        <span className="text-xs text-gray-400">{transfer.formattedDate}</span>
                                    </div>
                                </div>
                            </div>

                            {/* Efeito de brilho para Tier 1 */}
                            {isTier1 && (
                                <div className="absolute inset-0 bg-gradient-to-r from-transparent via-yellow-500/20 to-transparent rounded-2xl pointer-events-none tier-1-animation-premium" />
                            )}
                        </div>
                    </motion.div>
                );
            };

            // Renderização em modo Timeline
            const renderTimeline = () => (
                <div className="space-y-12">
                    <AnimatePresence>
                        {transfers.map((transfer, index) => (
                            <motion.div
                                key={transfer.id}
                                variants={containerVariants}
                                initial="hidden"
                                animate="visible"
                                className="relative"
                            >
                                {/* Linha do tempo premium */}
                                {index < transfers.length - 1 && (
                                    <div className="absolute left-1/2 top-full w-1 h-12 bg-gradient-to-b from-cyan-500/50 to-transparent transform -translate-x-1/2" />
                                )}
                                
                                {/* Card */}
                                <div className="flex justify-center">
                                    <TransferCardPremium 
                                        transfer={transfer} 
                                        index={index}
                                        isTier1={transfer.tier === 'TIER_1'}
                                    />
                                </div>
                            </motion.div>
                        ))}
                    </AnimatePresence>
                </div>
            );

            // Renderização em modo Grid
            const renderGrid = () => (
                <motion.div
                    variants={containerVariants}
                    initial="hidden"
                    animate="visible"
                    className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
                >
                    <AnimatePresence>
                        {transfers.map((transfer, index) => (
                            <TransferCardPremium 
                                key={transfer.id}
                                transfer={transfer} 
                                index={index}
                                isTier1={transfer.tier === 'TIER_1'}
                            />
                        ))}
                    </AnimatePresence>
                </motion.div>
            );

            // Loading premium
            if (loading && transfers.length === 0) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="premium-loader w-16 h-16 rounded-full mx-auto mb-6"></div>
                            <p className="text-gray-400 text-lg premium-fade-in">Carregando transferências seguras...</p>
                            <div className="mt-4 flex items-center justify-center space-x-2">
                                <div className="w-2 h-2 bg-cyan-500 rounded-full animate-pulse"></div>
                                <div className="w-2 h-2 bg-yellow-500 rounded-full animate-pulse" style={{ animationDelay: '0.5s' }}></div>
                                <div className="w-2 h-2 bg-cyan-500 rounded-full animate-pulse" style={{ animationDelay: '1s' }}></div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <svg className="w-20 h-20 mx-auto mb-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 2.502-3.208V8.697c0-1.54-1.963-2.208-3.502-2.208H5.142c-1.54 0-2.502 1.667-2.502 3.208v6.086c0 1.54 1.963 2.208 3.502 2.208z" />
                            </svg>
                            <p className="text-red-400 text-lg mb-4">{error}</p>
                            <div className="flex items-center justify-center space-x-2 mb-4">
                                <div className="w-2 h-2 bg-red-500 rounded-full"></div>
                                <span className="text-red-400 text-sm">Segurança comprometida</span>
                            </div>
                            <button 
                                onClick={fetchTransfers}
                                className="px-8 py-3 bg-gradient-to-r from-cyan-500 to-blue-500 text-white rounded-lg hover:from-cyan-600 hover:to-blue-600 transition-all transform hover:scale-105"
                            >
                                Tentar novamente
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-8">
                    {/* Header Premium */}
                    <motion.div
                        initial={{ opacity: 0, y: -30 }}
                        animate={{ opacity: 1, y: 0 }}
                        className="text-center mb-12"
                    >
                        <h1 className="text-5xl font-bold premium-text mb-4 flex items-center justify-center space-x-4">
                            <svg className="w-12 h-12 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                            </svg>
                            Mercado da Bola Premium
                        </h1>
                        <p className="text-gray-300 text-lg max-w-2xl mx-auto">
                            Transferências com segurança militar e estética de elite
                        </p>
                        
                        {/* Status de Segurança */}
                        <div className="flex items-center justify-center mt-6 space-x-4">
                            <div className={`px-4 py-2 rounded-full flex items-center space-x-2 ${
                                securityStatus === 'verified' ? 'bg-green-500/20 border-green-500' :
                                securityStatus === 'compromised' ? 'bg-red-500/20 border-red-500' :
                                'bg-gray-500/20 border-gray-500'
                            }`}>
                                <div className={`w-3 h-3 rounded-full ${
                                    securityStatus === 'verified' ? 'bg-green-500' :
                                    securityStatus === 'compromised' ? 'bg-red-500' :
                                    'bg-gray-500'
                                }`} />
                                <span className={`text-sm font-medium ${
                                    securityStatus === 'verified' ? 'text-green-400' :
                                    securityStatus === 'compromised' ? 'text-red-400' :
                                    'text-gray-400'
                                }`}>
                                    {securityStatus === 'verified' ? 'Segurança Verificada' :
                                     securityStatus === 'compromised' ? 'Segurança Comprometida' :
                                     'Verificando...'}
                                </span>
                            </div>
                        </div>
                    </motion.div>

                    {/* Estatísticas Premium */}
                    {stats && (
                        <motion.div
                            initial={{ opacity: 0, y: 30 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ delay: 0.3 }}
                            className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12"
                        >
                            <div className="glass-card-premium p-8 text-center">
                                <div className="text-4xl font-bold premium-text mb-3">{stats.totalTransfers}</div>
                                <div className="text-gray-300">Transferências</div>
                            </div>
                            
                            <div className="glass-card-cyan p-8 text-center">
                                <div className="text-4xl font-bold text-cyan-400 mb-3">{stats.totalSpent}</div>
                                <div className="text-gray-300">Total Gasto</div>
                            </div>
                            
                            <div className="glass-card-gold p-8 text-center">
                                <div className="text-4xl font-bold gold-text mb-3">{stats.averageFee}</div>
                                <div className="text-gray-300">Taxa Média</div>
                            </div>
                            
                            <div className="glass-card-premium p-8 text-center">
                                <div className="text-4xl font-bold premium-text mb-3">{stats.mostActiveClubs[0]?.transfers || 0}</div>
                                <div className="text-gray-300">{stats.mostActiveClubs[0]?.clubName || '-'}</div>
                            </div>
                        </motion.div>
                    )}

                    {/* Controles Premium */}
                    <motion.div
                        initial={{ opacity: 0, y: 30 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ delay: 0.4 }}
                        className="flex justify-center mb-12 space-x-6"
                    >
                        <button
                            onClick={() => setViewMode('timeline')}
                            className={`px-8 py-3 rounded-full transition-all transform hover:scale-105 ${
                                viewMode === 'timeline' 
                                    ? 'bg-gradient-to-r from-cyan-500 to-blue-500 text-white' 
                                    : 'glass-card-premium text-gray-300 hover:bg-white/10'
                            }`}
                        >
                            Timeline
                        </button>
                        <button
                            onClick={() => setViewMode('grid')}
                            className={`px-8 py-3 rounded-full transition-all transform hover:scale-105 ${
                                viewMode === 'grid' 
                                    ? 'bg-gradient-to-r from-cyan-500 to-blue-500 text-white' 
                                    : 'glass-card-premium text-gray-300 hover:bg-white/10'
                            }`}
                        >
                            Grade
                        </button>
                    </motion.div>

                    {/* Lista de Transferências */}
                    <motion.div
                        initial={{ opacity: 0, y: 30 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ delay: 0.5 }}
                    >
                        {transfers.length === 0 ? (
                            <div className="text-center py-16">
                                <svg className="w-24 h-24 mx-auto mb-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                                </svg>
                                <p className="text-gray-400 text-lg">Nenhuma transferência encontrada</p>
                            </div>
                        ) : (
                            viewMode === 'timeline' ? renderTimeline() : renderGrid()
                        )}
                    </motion.div>
                </div>
            );
        };

        // Mouse tracking para gradiente dinâmico premium
        useEffect(() => {
            const handleMouseMove = (e) => {
                const x = (e.clientX / window.innerWidth) * 100;
                const y = (e.clientY / window.innerHeight) * 100;
                
                const overlay = document.querySelector('.gradient-overlay-premium');
                if (overlay) {
                    overlay.style.setProperty('--mouse-x', `${x}%`);
                    overlay.style.setProperty('--mouse-y', `${y}%`);
                }
            };
            
            window.addEventListener('mousemove', handleMouseMove);
            return () => window.removeEventListener('mousemove', handleMouseMove);
        }, []);

        // Renderizar aplicativo
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TransferMarketPremium />);
    </script>
</body>
</html>
