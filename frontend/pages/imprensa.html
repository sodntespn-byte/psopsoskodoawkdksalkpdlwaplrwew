<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imprensa - PSO Brasil</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <style>
        /* Page-specific styles only */
        body {
            background: radial-gradient(ellipse 100% 80% at 50% 0%, #002200 0%, #001100 20%, #000000 60%);
            background-attachment: fixed;
        }
        .nav-links a:hover { color: var(--neon-green); }
        
        main { padding-top: 100px; padding-bottom: 60px; }
        
        .page-header { padding: 60px 0 40px; text-align: center; }
        .page-badge { display: inline-block; padding: 6px 12px; background: var(--dark-gray); border: 1px solid var(--border-gray); border-bottom: 2px solid var(--neon-yellow); font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.15em; color: var(--text-gray); text-transform: uppercase; margin-bottom: 16px; }
        .page-title { font-family: 'Rajdhani', sans-serif; font-size: 48px; font-weight: 700; letter-spacing: 0.05em; }
        .page-title span { color: var(--neon-green); }
        
        .filters { display: flex; gap: 16px; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn { padding: 10px 20px; background: transparent; border: 1px solid var(--border-gray); color: var(--text-gray); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
        .filter-btn:hover, .filter-btn.active { border-color: var(--neon-green); color: var(--neon-green); }
        
        .news-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .news-card { background: var(--dark-gray); border: 1px solid var(--border-gray); overflow: hidden; transition: all 0.3s; animation: fadeInUp 0.5s ease-out both; cursor: pointer; }
        .news-card:hover { border-color: var(--neon-green); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(34, 197, 94, 0.1); }
        .news-card:nth-child(1) { animation-delay: 0.1s; }
        .news-card:nth-child(2) { animation-delay: 0.15s; }
        .news-card:nth-child(3) { animation-delay: 0.2s; }
        .news-card:nth-child(4) { animation-delay: 0.25s; }
        .news-card:nth-child(5) { animation-delay: 0.3s; }
        .news-card:nth-child(6) { animation-delay: 0.35s; }
        
        .news-image { width: 100%; height: 200px; object-fit: cover; background: var(--mid-gray); }
        .news-content { padding: 24px; }
        .news-meta { display: flex; gap: 12px; margin-bottom: 12px; font-size: 11px; }
        .news-category { color: var(--neon-green); font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
        .news-date { color: var(--text-gray); }
        .news-title { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 600; letter-spacing: 0.03em; margin-bottom: 12px; line-height: 1.3; }
        .news-excerpt { font-size: 13px; color: var(--text-gray); line-height: 1.6; }
        .news-footer { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-top: 1px solid var(--border-gray); }
        .news-author { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-gray); }
        .read-more { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; color: var(--neon-green); text-transform: uppercase; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; overflow-y: auto; }
        .modal.active { display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .modal-content { background: var(--dark-gray); border: 1px solid var(--border-gray); max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: var(--mid-gray); border: 1px solid var(--border-gray); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-gray); transition: all 0.3s; z-index: 10; }
        .modal-close:hover { border-color: var(--neon-green); color: var(--neon-green); }
        .modal-image { width: 100%; height: 300px; object-fit: cover; }
        .modal-body { padding: 40px; }
        .modal-meta { display: flex; gap: 20px; margin-bottom: 20px; font-size: 12px; color: var(--text-gray); }
        .modal-title { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: 0.03em; margin-bottom: 20px; }
        .modal-text { font-size: 15px; line-height: 1.8; color: var(--text-light); }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 1024px) { .news-grid { grid-template-columns: repeat(2, 1fr); } }
        /* Admin Navigation */
        .nav-admin { display: flex; gap: 8px; align-items: center; margin-left: 16px; padding-left: 16px; border-left: 1px solid var(--border-gray); }
        .nav-admin.hidden { display: none; }
        .admin-icon { width: 36px; height: 36px; background: transparent; border: 1px solid var(--border-gray); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-gray); cursor: pointer; transition: all 0.3s; position: relative; text-decoration: none; }
        .admin-icon:hover { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
        .admin-icon::after { content: attr(data-tooltip); position: absolute; bottom: -35px; left: 50%; transform: translateX(-50%); background: var(--dark-gray); border: 1px solid var(--border-gray); padding: 4px 10px; font-size: 11px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100; border-radius: 4px; }
        .admin-icon:hover::after { opacity: 1; }
        
        /* Mobile Menu */
        .mobile-menu-btn { display: none; width: 40px; height: 40px; background: transparent; border: 1px solid var(--border-gray); color: var(--text-gray); cursor: pointer; transition: all 0.3s; align-items: center; justify-content: center; }
        .mobile-menu-btn:hover { border-color: var(--neon-green); color: var(--neon-green); }
        .nav-auth { display: flex; gap: 12px; align-items: center; }
        
        /* Gallery Section */
        .gallery-section { margin-top: 80px; padding-top: 60px; border-top: 1px solid var(--border-gray); }
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .gallery-item { aspect-ratio: 16/9; background: var(--dark-gray); border: 1px solid var(--border-gray); overflow: hidden; cursor: pointer; transition: all 0.3s; }
        .gallery-item:hover { border-color: var(--neon-green); transform: scale(1.02); box-shadow: 0 10px 30px rgba(34, 197, 94, 0.2); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .gallery-item:hover img { transform: scale(1.1); }
        
        @media (max-width: 1024px) { 
            .gallery-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) { 
            .news-grid { grid-template-columns: 1fr; } 
            .nav-links { display: none; position: absolute; top: 80px; left: 0; right: 0; background: var(--dark-gray); flex-direction: column; padding: 20px; gap: 16px; border-bottom: 1px solid var(--border-gray); }
            .nav-links.active { display: flex; }
            .mobile-menu-btn { display: flex; }
            .page-title { font-size: 32px; }
            .nav-admin { margin-left: 0; padding-left: 0; border-left: none; border-top: 1px solid var(--border-gray); padding-top: 16px; margin-top: 16px; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <a href="/" class="logo">
                <div class="logo-icon" style="padding: 0; overflow: hidden;"><img src="../images/logo.png" alt="PSO Brasil Logo" style="width: 38px; height: 38px; object-fit: contain;"></div>
                <div class="logo-text">
                    <h1>PSO BRASIL</h1>
                    <div class="version">IMPRENSA</div>
                </div>
            </a>
            <div class="nav-links">
                <a href="/">Início</a>
                <a href="/#rankings">Rankings</a>
                <a href="/torneios">Torneios</a>
                <a href="/mercado">Mercado</a>
                <a href="/imprensa" class="active">Imprensa</a>
                <a href="/registrar">Registrar</a>
                
                <!-- Admin Icons - Hidden by default -->
                <div class="nav-admin hidden" id="nav-admin">
                    <a href="/admin" class="admin-icon" data-tooltip="Painel Admin">
                        <i data-lucide="settings" style="width: 18px; height: 18px;"></i>
                    </a>
                    <button class="admin-icon" data-tooltip="Notificações" onclick="showNotificationPanel()">
                        <i data-lucide="bell" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </div>
            <div class="nav-auth">
                <button class="login-btn" id="login-btn" onclick="showLoginModal()">Entrar</button>
            </div>
            <button class="mobile-menu-btn" aria-label="Menu" onclick="toggleMobileMenu()">
                <i data-lucide="menu" style="width: 20px; height: 20px;"></i>
            </button>
        </nav>
    </header>
    
    <main>
        <div class="container">
            <div class="page-header">
                <div class="page-badge">COBERTURA COMPLETA</div>
                <h1 class="page-title">JORNAL <span>PSO</span></h1>
            </div>
            
            <div class="filters">
                <button class="filter-btn active" data-filter="all" onclick="filterNews('all')">Todas</button>
                <button class="filter-btn" data-filter="urgente" onclick="filterNews('urgente')">Urgente</button>
                <button class="filter-btn" data-filter="analise" onclick="filterNews('analise')">Analise</button>
                <button class="filter-btn" data-filter="entrevista" onclick="filterNews('entrevista')">Entrevista</button>
                <button class="filter-btn" data-filter="transferencia" onclick="filterNews('transferencia')">Transferencia</button>
            </div>
            
            <div class="news-grid" id="newsGrid">
                <!-- News cards will be inserted here -->
            </div>
            
            <!-- Galeria Section - Integrated into Imprensa -->
            <section class="gallery-section" id="galeria">
                <h2 class="section-title" style="font-family: 'Rajdhani', sans-serif; font-size: 32px; margin-bottom: 32px;">
                    GALERIA <span style="color: var(--neon-green);">PSO</span>
                </h2>
                <div class="gallery-grid" id="galleryGrid">
                    <div class="gallery-item" onclick="openGalleryModal('https://images.unsplash.com/photo-1574629810380-605e02525e32?w=1200')">
                        <img src="https://images.unsplash.com/photo-1574629810380-605e02525e32?w=400" alt="Partida PSO">
                    </div>
                    <div class="gallery-item" onclick="openGalleryModal('https://images.unsplash.com/photo-1560272564-c83b66b6ad52?w=1200')">
                        <img src="https://images.unsplash.com/photo-1560272564-c83b66b6ad52?w=400" alt="Estádio">
                    </div>
                    <div class="gallery-item" onclick="openGalleryModal('https://images.unsplash.com/photo-1517466483083-6711d0d23fd3?w=1200')">
                        <img src="https://images.unsplash.com/photo-1517466483083-6711d0d23fd3?w=400" alt="Jogador">
                    </div>
                    <div class="gallery-item" onclick="openGalleryModal('https://images.unsplash.com/photo-1489944440615-453fc2b6a9a9?w=1200')">
                        <img src="https://images.unsplash.com/photo-1489944440615-453fc2b6a9a9?w=400" alt="Bola">
                    </div>
                    <div class="gallery-item" onclick="openGalleryModal('https://images.unsplash.com/photo-1431324155629-1a6deb1dec8d?w=1200')">
                        <img src="https://images.unsplash.com/photo-1431324155629-1a6deb1dec8d?w=400" alt="Torcida">
                    </div>
                    <div class="gallery-item" onclick="openGalleryModal('https://images.unsplash.com/photo-1522778119026-d647f0565c6a?w=1200')">
                        <img src="https://images.unsplash.com/photo-1522778119026-d647f0565c6a?w=400" alt="Chuteira">
                    </div>
                    <div class="gallery-item" onclick="openGalleryModal('https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=1200')">
                        <img src="https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=400" alt="Gol">
                    </div>
                    <div class="gallery-item" onclick="openGalleryModal('https://images.unsplash.com/photo-1551958219-acbc608c6377?w=1200')">
                        <img src="https://images.unsplash.com/photo-1551958219-acbc608c6377?w=400" alt="Comemoração">
                    </div>
                </div>
            </section>
        </div>
    </main>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()"><i data-lucide="x" style="width: 20px; height: 20px;"></i></button>
            <img class="modal-image" id="modalImage" src="" alt="">
            <div class="modal-body">
                <div class="modal-meta">
                    <span id="modalCategory"></span>
                    <span>|</span>
                    <span id="modalDate"></span>
                    <span>|</span>
                    <span id="modalReadTime"></span>
                </div>
                <h2 class="modal-title" id="modalTitle"></h2>
                <div class="modal-text" id="modalContent"></div>
            </div>
        </div>
    </div>
    
    <script>
        const news = [
            {
                id: 1,
                title: "FLAMENGO CONQUISTA TITULO HISTORICO NA LIBERTADORES",
                excerpt: "Time carioca derrota Palmeiras na final e conquista primeiro titulo continental na historia do PSO Brasil.",
                category: "URGENTE",
                date: "07 ABR 2026",
                readTime: "5 MIN",
                author: "Redacao PSO",
                image: "https://images.unsplash.com/photo-1574629810380-605e02525e32?w=800",
                content: "Em uma partida eletrizante que ficara marcada na historia do PSO Brasil, o Flamengo conquistou seu primeiro titulo da Libertadores..."
            },
            {
                id: 2,
                title: "MERCADO DE TRANSFERENCIAS: AS MAIOR MOVIMENTACAO DA TEMPORADA",
                excerpt: "Confira as principais contratacoes e vendas que movimentaram o mercado nesta janela de transferencias.",
                category: "ANALISE",
                date: "06 ABR 2026",
                readTime: "8 MIN",
                author: "Analista PSO",
                image: "https://images.unsplash.com/photo-1560272564-c83b66b6ad52?w=800",
                content: "A janela de transferencias desta temporada trouxe movimentacoes inesperadas e negocios milionarios..."
            },
            {
                id: 3,
                title: "ENTREVISTA EXCLUSIVA: BRASILKING REVELA SEGREDOS DO SUCESSO",
                excerpt: "Campeao do ranking mundial concede entrevista exclusiva e fala sobre treinos, mindset e futuro.",
                category: "ENTREVISTA",
                date: "05 ABR 2026",
                readTime: "12 MIN",
                author: "Jornalista PSO",
                image: "https://images.unsplash.com/photo-1517466483083-6711d0d23fd3?w=800",
                content: "Em uma conversa franca e inspiradora, BrasilKing abriu o jogo sobre sua trajetoria..."
            },
            {
                id: 4,
                title: "VASCO ANUNCIA CONTRATACAO DE JOVEM PROMESSA",
                excerpt: "Cruz-maltino fecha com promessa de 17 anos que se destacou nas categorias de base.",
                category: "TRANSFERENCIA",
                date: "04 ABR 2026",
                readTime: "4 MIN",
                author: "Redacao PSO",
                image: null,
                content: "O Vasco da Gama anunciou nesta quinta-feira a contratacao de uma das maiores promessas..."
            },
            {
                id: 5,
                title: "COPA DO BRASIL: QUARTAS DE FINAL DEFINIDAS",
                excerpt: "Confira os confrontos das quartas de final da competicao mais tradicional do PSO Brasil.",
                category: "URGENTE",
                date: "03 ABR 2026",
                readTime: "6 MIN",
                author: "Redacao PSO",
                image: "https://images.unsplash.com/photo-1522771739844-6a9f6d5f13af?w=800",
                content: "As oitavas de final da Copa do Brasil chegaram ao fim e os confrontos das quartas estao definidos..."
            },
            {
                id: 6,
                title: "ANALISE TATICA: A REVOLUCAO DO 4-3-3 NO PSO",
                excerpt: "Especialistas analisam como a formacao tornou-se dominante no cenario competitivo brasileiro.",
                category: "ANALISE",
                date: "02 ABR 2026",
                readTime: "10 MIN",
                author: "Tatico PSO",
                image: null,
                content: "O sistema tatico 4-3-3 tem revolucionado a forma de jogar no PSO Brasil..."
            }
        ];
        
        function renderNews(filter = 'all') {
            const grid = document.getElementById('newsGrid');
            const filtered = filter === 'all' ? news : news.filter(n => n.category.toLowerCase() === filter);
            
            grid.innerHTML = filtered.map((item, index) => `
                <article class="news-card" onclick="openModal(${item.id})" style="animation-delay: ${index * 0.05}s">
                    ${item.image ? `<img src="${item.image}" alt="${item.title}" class="news-image">` : 
                      `<div class="news-image" style="display: flex; align-items: center; justify-content: center; background: var(--mid-gray);"><i data-lucide="newspaper" style="width: 40px; height: 40px; color: var(--border-gray);"></i></div>`}
                    <div class="news-content">
                        <div class="news-meta">
                            <span class="news-category">${item.category}</span>
                            <span class="news-date">${item.date}</span>
                        </div>
                        <h3 class="news-title">${item.title}</h3>
                        <p class="news-excerpt">${item.excerpt}</p>
                    </div>
                    <div class="news-footer">
                        <div class="news-author">
                            <i data-lucide="user" style="width: 14px; height: 14px;"></i>
                            <span>${item.author}</span>
                        </div>
                        <span class="read-more">Ler mais →</span>
                    </div>
                </article>
            `).join('');
            
            lucide.createIcons();
        }
        
        function openModal(id) {
            const item = news.find(n => n.id === id);
            if (!item) return;
            
            document.getElementById('modalImage').src = item.image || '';
            document.getElementById('modalImage').style.display = item.image ? 'block' : 'none';
            document.getElementById('modalCategory').textContent = item.category;
            document.getElementById('modalDate').textContent = item.date;
            document.getElementById('modalReadTime').textContent = item.readTime + ' DE LEITURA';
            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalContent').textContent = item.content;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        function filterNews(filter) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.filter-btn[data-filter="${filter}"]`).classList.add('active');
            renderNews(filter);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            renderNews();
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
        
        // Admin check
        function checkAdminStatus() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const navAdmin = document.getElementById('nav-admin');
            if (token && user && (user.role === 'admin' || user.username === 'admin')) {
                navAdmin.classList.remove('hidden');
            } else {
                navAdmin.classList.add('hidden');
            }
        }
        
        // Mobile menu toggle
        function toggleMobileMenu() {
            const navLinks = document.querySelector('.nav-links');
            const mobileBtn = document.querySelector('.mobile-menu-btn');
            navLinks.classList.toggle('active');
            const icon = mobileBtn.querySelector('i');
            if (icon) {
                const isOpen = navLinks.classList.contains('active');
                icon.setAttribute('data-lucide', isOpen ? 'x' : 'menu');
                lucide.createIcons();
            }
        }
        
        // Gallery modal
        function openGalleryModal(imageUrl) {
            const modal = document.getElementById('modal');
            document.getElementById('modalImage').src = imageUrl;
            document.getElementById('modalImage').style.display = 'block';
            document.getElementById('modalCategory').textContent = 'GALERIA';
            document.getElementById('modalDate').textContent = new Date().toLocaleDateString('pt-BR');
            document.getElementById('modalReadTime').textContent = 'IMAGEM';
            document.getElementById('modalTitle').textContent = 'Galeria PSO Brasil';
            document.getElementById('modalContent').textContent = 'Clique fora da imagem para fechar.';
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        // Show login modal placeholder
        function showLoginModal() {
            alert('Sistema de login - Redirecionando para página de registro');
            window.location.href = '/registrar';
        }
        
        // Show notification panel
        function showNotificationPanel() {
            alert('Sistema de notificações - Conecte o webhook do Discord nas configurações');
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            checkAdminStatus();
            lucide.createIcons();
        });
    </script>
</body>
</html>
