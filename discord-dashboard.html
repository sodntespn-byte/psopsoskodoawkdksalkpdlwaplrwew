<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSO Brasil - Painel de Controle Discord</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React e Dependências -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10/dist/framer-motion.min.js"></script>
    
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <!-- Estilos Personalizados -->
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #05070A;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
        
        .glass-card-primary {
            background: rgba(0, 209, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 209, 255, 0.2);
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0, 209, 255, 0.3);
        }
        
        .glass-card-secondary {
            background: rgba(255, 215, 0, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }
        
        .glass-card-accent {
            background: rgba(0, 255, 65, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0, 255, 65, 0.3);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #05070A 0%, #0A0A0F 50%, #05070A 100%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
        }
        
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(0, 209, 255, 0.05) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }
        
        .content {
            position: relative;
            z-index: 10;
        }
        
        .discord-button {
            background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .discord-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(88, 101, 242, 0.3);
        }
        
        .match-card {
            transition: all 0.3s ease;
        }
        
        .match-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 209, 255, 0.2);
        }
        
        .winner-highlight {
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            border-color: rgba(255, 215, 0, 0.3);
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="gradient-overlay"></div>
    <div class="content" id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        // Componente RecentResults
        const RecentResults = () => {
            const [matches, setMatches] = useState([]);
            const [loading, setLoading] = useState(true);
            const [socket, setSocket] = useState(null);
            const [lastUpdate, setLastUpdate] = useState(null);

            // Conectar WebSocket
            useEffect(() => {
                const newSocket = io('http://localhost:3000');
                
                newSocket.on('connect', () => {
                    console.log('Conectado ao WebSocket');
                });
                
                newSocket.on('match-finished', (data) => {
                    console.log('Nova partida recebida:', data);
                    setMatches(prev => [data.match, ...prev.slice(0, 9)]);
                    setLastUpdate(new Date());
                });
                
                newSocket.on('disconnect', () => {
                    console.log('Desconectado do WebSocket');
                });
                
                setSocket(newSocket);
                
                // Buscar dados iniciais
                fetchRecentMatches();
                
                return () => newSocket.close();
            }, []);

            // Buscar resultados recentes
            const fetchRecentMatches = async () => {
                try {
                    setLoading(true);
                    const response = await fetch('/api/matches/recent?limit=10');
                    const data = await response.json();
                    
                    if (data.success) {
                        setMatches(data.matches);
                        setLastUpdate(new Date());
                    }
                } catch (error) {
                    console.error('Erro ao buscar resultados:', error);
                } finally {
                    setLoading(false);
                }
            };

            // Formatar data
            const formatDate = (date) => {
                return new Date(date).toLocaleDateString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            };

            // Determinar vencedor
            const getWinner = (match) => {
                if (match.homeScore > match.awayScore) {
                    return { team: match.homeTeam, isHome: true };
                } else if (match.awayScore > match.homeScore) {
                    return { team: match.awayTeam, isHome: false };
                }
                return null;
            };

            if (loading && matches.length === 0) {
                return (
                    <div className="glass-card-primary p-6">
                        <div className="flex items-center justify-center h-32">
                            <div className="animate-spin rounded-full h-8 w-8 border-2 border-primary-500 border-t-transparent"></div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="glass-card-primary p-6">
                    <div className="flex items-center justify-between mb-6">
                        <div className="flex items-center space-x-3">
                            <svg className="w-6 h-6 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <h2 className="text-xl font-bold text-white">Últimos Resultados</h2>
                        </div>
                        
                        <div className="flex items-center space-x-4">
                            {lastUpdate && (
                                <div className="flex items-center space-x-2 text-xs text-gray-400">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                    <span>Atualizado: {formatDate(lastUpdate)}</span>
                                </div>
                            )}
                            
                            <button
                                onClick={fetchRecentMatches}
                                className="p-2 bg-white/10 rounded-lg text-white hover:bg-white/20 transition-colors"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div className="space-y-4">
                        <AnimatePresence>
                            {matches.map((match, index) => {
                                const winner = getWinner(match);
                                const isDraw = !winner;

                                return (
                                    <motion.div
                                        key={`${match.id}-${index}`}
                                        initial={{ opacity: 0, y: 20, scale: 0.95 }}
                                        animate={{ opacity: 1, y: 0, scale: 1 }}
                                        exit={{ opacity: 0, x: -100 }}
                                        transition={{ type: 'spring', damping: 25, stiffness: 400 }}
                                        layout
                                    >
                                        <div className={`glass-card p-4 match-card ${isDraw ? 'glass-card-accent' : winner?.isHome ? 'glass-card-primary' : 'glass-card-secondary'} ${!isDraw && index === 0 ? 'winner-highlight' : ''}`}>
                                            <div className="flex items-center justify-between mb-3">
                                                <div className="flex items-center space-x-2">
                                                    <svg className="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                                    </svg>
                                                    <span className="text-xs text-gray-400">{match.league?.name || 'Partida'}</span>
                                                </div>
                                                <span className="text-xs text-gray-400">
                                                    {formatDate(match.matchDate)}
                                                </span>
                                            </div>

                                            <div className="flex items-center justify-between">
                                                <div className={`flex items-center space-x-3 flex-1 ${!isDraw && winner?.isHome ? 'opacity-100' : 'opacity-70'}`}>
                                                    <div className="w-12 h-12 bg-gradient-to-br from-primary-500/20 to-secondary-500/20 rounded-lg flex items-center justify-center border border-white/10">
                                                        {match.homeTeam?.logoUrl ? (
                                                            <img 
                                                                src={match.homeTeam.logoUrl} 
                                                                alt={match.homeTeam.name}
                                                                className="w-8 h-8 object-contain"
                                                            />
                                                        ) : (
                                                            <svg className="w-6 h-6 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                                            </svg>
                                                        )}
                                                    </div>
                                                    <div className="flex-1">
                                                        <p className="text-white font-medium">{match.homeTeam?.name || 'Time Mandante'}</p>
                                                        <p className="text-xs text-gray-400">Mandante</p>
                                                    </div>
                                                </div>

                                                <div className="flex flex-col items-center px-4">
                                                    <div className={`text-2xl font-bold ${isDraw ? 'text-accent-400' : winner?.isHome ? 'text-primary-400' : 'text-secondary-400'}`}>
                                                        {match.homeScore}
                                                    </div>
                                                    <div className="text-xs text-gray-400">X</div>
                                                    <div className={`text-2xl font-bold ${isDraw ? 'text-accent-400' : !winner?.isHome ? 'text-primary-400' : 'text-secondary-400'}`}>
                                                        {match.awayScore}
                                                    </div>
                                                </div>

                                                <div className={`flex items-center space-x-3 flex-1 justify-end ${!isDraw && !winner?.isHome ? 'opacity-100' : 'opacity-70'}`}>
                                                    <div className="flex-1 text-right">
                                                        <p className="text-white font-medium">{match.awayTeam?.name || 'Time Visitante'}</p>
                                                        <p className="text-xs text-gray-400">Visitante</p>
                                                    </div>
                                                    <div className="w-12 h-12 bg-gradient-to-br from-secondary-500/20 to-primary-500/20 rounded-lg flex items-center justify-center border border-white/10">
                                                        {match.awayTeam?.logoUrl ? (
                                                            <img 
                                                                src={match.awayTeam.logoUrl} 
                                                                alt={match.awayTeam.name}
                                                                className="w-8 h-8 object-contain"
                                                            />
                                                        ) : (
                                                            <svg className="w-6 h-6 text-secondary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                                            </svg>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="mt-3 pt-3 border-t border-white/10">
                                                <div className="flex items-center justify-center">
                                                    {isDraw ? (
                                                        <span className="text-accent-400 text-sm font-medium">Empate</span>
                                                    ) : (
                                                        <span className={`${winner?.isHome ? 'text-primary-400' : 'text-secondary-400'} text-sm font-medium`}>
                                                            {winner.team.name} venceu
                                                        </span>
                                                    )}
                                                </div>
                                            </div>

                                            {index === 0 && lastUpdate && new Date() - new Date(match.createdAt) < 60000 && (
                                                <motion.div
                                                    initial={{ scale: 0 }}
                                                    animate={{ scale: 1 }}
                                                    className="absolute top-2 right-2 w-2 h-2 bg-green-500 rounded-full pulse"
                                                />
                                            )}
                                        </div>
                                    </motion.div>
                                );
                            })}
                        </AnimatePresence>
                    </div>

                    {matches.length === 0 && !loading && (
                        <div className="text-center py-8">
                            <svg className="w-12 h-12 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <p className="text-gray-400">Nenhum resultado encontrado</p>
                        </div>
                    )}
                </div>
            );
        };

        // Componente Status
        const Status = () => {
            const [status, setStatus] = useState({
                discord: 'offline',
                websocket: 'offline',
                webhook: 'not configured'
            });

            useEffect(() => {
                const checkStatus = async () => {
                    try {
                        const response = await fetch('/api/health');
                        const data = await response.json();
                        setStatus(data.services);
                    } catch (error) {
                        console.error('Erro ao verificar status:', error);
                    }
                };

                checkStatus();
                const interval = setInterval(checkStatus, 30000);
                return () => clearInterval(interval);
            }, []);

            const getStatusColor = (service) => {
                switch (service) {
                    case 'online': return 'text-green-400';
                    case 'offline': return 'text-red-400';
                    case 'configured': return 'text-green-400';
                    case 'not configured': return 'text-yellow-400';
                    default: return 'text-gray-400';
                }
            };

            return (
                <div className="glass-card p-4">
                    <h3 className="text-lg font-bold text-white mb-4">Status do Sistema</h3>
                    <div className="space-y-2">
                        <div className="flex items-center justify-between">
                            <span className="text-gray-300">Discord Bot</span>
                            <span className={getStatusColor(status.discord)}>
                                {status.discord === 'online' ? 'Online' : 'Offline'}
                            </span>
                        </div>
                        <div className="flex items-center justify-between">
                            <span className="text-gray-300">WebSocket</span>
                            <span className={getStatusColor(status.websocket)}>
                                {status.websocket === 'online' ? 'Online' : 'Offline'}
                            </span>
                        </div>
                        <div className="flex items-center justify-between">
                            <span className="text-gray-300">Webhook</span>
                            <span className={getStatusColor(status.webhook)}>
                                {status.webhook === 'configured' ? 'Configurado' : 'Não configurado'}
                            </span>
                        </div>
                    </div>
                </div>
            );
        };

        // Componente Principal
        const App = () => {
            const [mousePosition, setMousePosition] = useState({ x: 50, y: 50 });

            // Mouse tracking para gradiente dinâmico
            useEffect(() => {
                const handleMouseMove = (e) => {
                    const x = (e.clientX / window.innerWidth) * 100;
                    const y = (e.clientY / window.innerHeight) * 100;
                    setMousePosition({ x, y });
                    
                    const overlay = document.querySelector('.gradient-overlay');
                    if (overlay) {
                        overlay.style.setProperty('--mouse-x', `${x}%`);
                        overlay.style.setProperty('--mouse-y', `${y}%`);
                    }
                };
                
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-6xl mx-auto space-y-6">
                        {/* Header */}
                        <motion.div
                            initial={{ opacity: 0, y: -20 }}
                            animate={{ opacity: 1, y: 0 }}
                            className="text-center mb-8"
                        >
                            <h1 className="text-4xl font-bold text-white mb-2">
                                PSO Brasil
                            </h1>
                            <p className="text-gray-400">
                                Painel de Controle Discord - Resultados em Tempo Real
                            </p>
                        </motion.div>

                        {/* Grid Principal */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Resultados */}
                            <div className="lg:col-span-2">
                                <RecentResults />
                            </div>

                            {/* Status */}
                            <div className="space-y-6">
                                <Status />
                                
                                <div className="glass-card p-4">
                                    <h3 className="text-lg font-bold text-white mb-4">Comandos Discord</h3>
                                    <div className="space-y-2 text-sm">
                                        <div className="flex items-center space-x-2">
                                            <span className="text-primary-400">/postar-resultado</span>
                                            <span className="text-gray-400">Registrar partida</span>
                                        </div>
                                        <div className="flex items-center space-x-2">
                                            <span className="text-primary-400">/set-foto</span>
                                            <span className="text-gray-400">Atualizar logo</span>
                                        </div>
                                        <div className="flex items-center space-x-2">
                                            <span className="text-primary-400">/set-ordem</span>
                                            <span className="text-gray-400">Ordenar ligas</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="glass-card p-4">
                                    <h3 className="text-lg font-bold text-white mb-4">Integração</h3>
                                    <div className="space-y-3">
                                        <button className="discord-button w-full">
                                            Conectar ao Discord
                                        </button>
                                        <button className="discord-button w-full">
                                            Ver Canais
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Renderizar aplicativo
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
