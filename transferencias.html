<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferências - PSO Brasil</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React e Dependências -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10/dist/framer-motion.min.js"></script>
    
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <!-- Estilos Personalizados -->
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #05070A;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
        
        .glass-card-primary {
            background: rgba(0, 209, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 209, 255, 0.2);
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0, 209, 255, 0.3);
        }
        
        .glass-card-secondary {
            background: rgba(255, 215, 0, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }
        
        .glass-card-accent {
            background: rgba(0, 255, 65, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0, 255, 65, 0.3);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #05070A 0%, #0A0A0F 50%, #05070A 100%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
        }
        
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(0, 209, 255, 0.05) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }
        
        .content {
            position: relative;
            z-index: 10;
        }
        
        .tier-1-glow {
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.5);
            border-color: rgba(0, 255, 65, 0.5);
        }
        
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .tier-1-animation {
            animation: tier1Pulse 3s infinite;
        }
        
        @keyframes tier1Pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        
        .new-badge {
            animation: newBadgePulse 2s infinite;
        }
        
        @keyframes newBadgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="gradient-overlay"></div>
    <div class="content" id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        // Componente TransferMarket
        const TransferMarket = () => {
            const [transfers, setTransfers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [stats, setStats] = useState(null);
            const [viewMode, setViewMode] = useState('timeline');
            const [socket, setSocket] = useState(null);

            // Buscar transferências
            const fetchTransfers = async () => {
                try {
                    setLoading(true);
                    setError(null);

                    const response = await fetch('/api/transfers?limit=50');
                    
                    if (!response.ok) {
                        throw new Error('Falha ao buscar transferências');
                    }

                    const data = await response.json();
                    
                    if (data.success) {
                        setTransfers(data.data.transfers);
                        setStats(data.data.stats);
                    } else {
                        throw new Error(data.message || 'Erro ao buscar transferências');
                    }
                } catch (err) {
                    console.error('Erro ao buscar transferências:', err);
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            // WebSocket para atualizações em tempo real
            useEffect(() => {
                const newSocket = io('http://localhost:3000');
                
                newSocket.on('connect', () => {
                    console.log('Conectado ao WebSocket de transferências');
                });

                newSocket.on('new-transfer', (data) => {
                    console.log('Nova transferência recebida:', data);
                    setTransfers(prev => [data.transfer, ...prev.slice(0, 49)]);
                });

                newSocket.on('disconnect', () => {
                    console.log('Desconectado do WebSocket');
                });

                setSocket(newSocket);
                
                // Buscar dados iniciais
                fetchTransfers();

                return () => newSocket.close();
            }, []);

            // Animações
            const containerVariants = {
                hidden: { opacity: 0 },
                visible: {
                    opacity: 1,
                    transition: {
                        staggerChildren: 0.1
                    }
                }
            };

            const itemVariants = {
                hidden: { 
                    opacity: 0, 
                    y: 30, 
                    scale: 0.9 
                },
                visible: { 
                    opacity: 1, 
                    y: 0, 
                    scale: 1,
                    transition: { 
                        type: 'spring', 
                        damping: 20, 
                        stiffness: 300 
                    }
                }
            };

            const tier1Variants = {
                hidden: { 
                    opacity: 0, 
                    y: 50, 
                    scale: 0.8,
                    rotate: -5
                },
                visible: { 
                    opacity: 1, 
                    y: 0, 
                    scale: 1,
                    rotate: 0,
                    transition: { 
                        type: 'spring', 
                        damping: 15, 
                        stiffness: 400,
                        duration: 0.8
                    }
                }
            };

            // Componente de card
            const TransferCard = ({ transfer, index, isTier1 = false }) => {
                const isNew = transfer.isRecent;
                const isFreeAgent = transfer.isFreeAgent;
                
                return (
                    <motion.div
                        key={transfer.id}
                        variants={isTier1 ? tier1Variants : itemVariants}
                        className="relative"
                    >
                        <div className={`glass-card ${isTier1 ? 'glass-card-accent tier-1-glow' : 'glass-card-primary'} p-6 hover:scale-[1.02] transition-all duration-300`}>
                            {/* Selo de Novo */}
                            <AnimatePresence>
                                {isNew && (
                                    <motion.div
                                        initial={{ scale: 0, rotate: -180 }}
                                        animate={{ scale: 1, rotate: 0 }}
                                        exit={{ scale: 0, rotate: 180 }}
                                        className="absolute -top-2 -right-2 bg-gradient-to-r from-accent-500 to-primary-500 text-white text-xs px-3 py-1 rounded-full font-bold new-badge"
                                    >
                                        NOVO
                                    </motion.div>
                                )}
                            </AnimatePresence>

                            {/* Selo de Tier 1 */}
                            <AnimatePresence>
                                {isTier1 && (
                                    <motion.div
                                        initial={{ scale: 0 }}
                                        animate={{ scale: 1 }}
                                        className="absolute -top-2 -left-2 bg-gradient-to-r from-yellow-500 to-orange-500 text-white text-xs px-3 py-1 rounded-full font-bold flex items-center space-x-1"
                                    >
                                        <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                                            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.003 1.603-.921 1.902 0l1.07-3.292a1 1 0 00.95-.69h3.462c.969 0 1.371-1.24.588-1.81l-2.8-2.034a1 1 0 00-.364-1.118L1.07 3.292c-.3.921.003-1.603.921-1.902 0z" />
                                        </svg>
                                        <span>TIER 1</span>
                                    </motion.div>
                                )}
                            </AnimatePresence>

                            {/* Anúncio Principal */}
                            <div className="text-center mb-4">
                                <div className="text-lg font-bold text-white">
                                    {transfer.announcement}
                                </div>
                            </div>

                            {/* Transferência Visual */}
                            <div className="flex items-center justify-between mb-4">
                                {/* Clube Antigo */}
                                <div className="flex flex-col items-center space-y-2">
                                    {isFreeAgent ? (
                                        <div className="w-16 h-16 bg-gradient-to-br from-gray-600 to-gray-700 rounded-lg flex items-center justify-center border border-gray-500">
                                            <svg className="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                            </svg>
                                        </div>
                                    ) : (
                                        <div className="w-16 h-16 bg-gradient-to-br from-red-500/20 to-orange-500/20 rounded-lg flex items-center justify-center border border-red-500/30">
                                            {transfer.oldClub?.logoUrl ? (
                                                <img 
                                                    src={transfer.oldClub.logoUrl} 
                                                    alt={transfer.oldClub.name}
                                                    className="w-12 h-12 object-contain"
                                                />
                                            ) : (
                                                <svg className="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                                </svg>
                                            )}
                                        </div>
                                    )}
                                    <span className="text-xs text-gray-400 text-center max-w-[80px] truncate">
                                        {isFreeAgent ? 'VLOCE' : transfer.oldClub?.name}
                                    </span>
                                </div>

                                {/* Seta */}
                                <div className="flex flex-col items-center space-y-2">
                                    <div className="text-2xl text-accent-400">
                                        <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7l5 5m0 0l-5 5m5-5H6" />
                                        </svg>
                                    </div>
                                    <span className="text-xs text-gray-400">Transferência</span>
                                </div>

                                {/* Novo Clube */}
                                <div className="flex flex-col items-center space-y-2">
                                    <div className="w-16 h-16 bg-gradient-to-br from-green-500/20 to-accent-500/20 rounded-lg flex items-center justify-center border border-green-500/30">
                                        {transfer.newClub?.logoUrl ? (
                                            <img 
                                                src={transfer.newClub.logoUrl} 
                                                alt={transfer.newClub.name}
                                                className="w-12 h-12 object-contain"
                                            />
                                        ) : (
                                            <svg className="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                        )}
                                    </div>
                                    <span className="text-xs text-gray-400 text-center max-w-[80px] truncate">
                                        {transfer.newClub?.name}
                                    </span>
                                </div>
                            </div>

                            {/* Detalhes do Contrato */}
                            <div className="grid grid-cols-2 gap-4 text-sm mb-4">
                                <div className="flex items-center space-x-2">
                                    <svg className="w-4 h-4 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2zm0 8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v8a2 2 0 002 2h.01M12 15h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                    <div>
                                        <p className="text-gray-400 text-xs">Salário</p>
                                        <p className="text-white font-semibold">{transfer.formattedSalary}</p>
                                    </div>
                                </div>
                                
                                <div className="flex items-center space-x-2">
                                    <svg className="w-4 h-4 text-accent-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                                    </svg>
                                    <div>
                                        <p className="text-gray-400 text-xs">Taxa</p>
                                        <p className="text-white font-semibold">{transfer.formattedFee}</p>
                                    </div>
                                </div>
                                
                                <div className="flex items-center space-x-2">
                                    <svg className="w-4 h-4 text-secondary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                    <div>
                                        <p className="text-gray-400 text-xs">Duração</p>
                                        <p className="text-white font-semibold">{transfer.duration} meses</p>
                                    </div>
                                </div>
                                
                                <div className="flex items-center space-x-2">
                                    <svg className="w-4 h-4 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9.476-6.031 9.476-11.622 0-1.048-.083-2.08-.249-3.07-.48z" />
                                    </svg>
                                    <div>
                                        <p className="text-gray-400 text-xs">Cláusula</p>
                                        <p className="text-white font-semibold">{transfer.formattedReleaseClause}</p>
                                    </div>
                                </div>
                            </div>

                            {/* Rodapé */}
                            <div className="flex items-center justify-between pt-4 border-t border-white/10">
                                <div className="flex items-center space-x-2">
                                    <span className="text-xs text-gray-400">Contrato</span>
                                    <span className="text-xs text-accent-400 font-mono">{transfer.contractId}</span>
                                </div>
                                <span className="text-xs text-gray-400">{transfer.formattedDate}</span>
                            </div>

                            {/* Efeito de brilho para Tier 1 */}
                            {isTier1 && (
                                <div className="absolute inset-0 bg-gradient-to-r from-transparent via-accent-500/20 to-transparent rounded-xl pointer-events-none tier-1-animation" />
                            )}
                        </div>
                    </motion.div>
                );
            };

            // Renderização em modo Timeline
            const renderTimeline = () => (
                <div className="space-y-8">
                    <AnimatePresence>
                        {transfers.map((transfer, index) => (
                            <motion.div
                                key={transfer.id}
                                variants={containerVariants}
                                initial="hidden"
                                animate="visible"
                                className="relative"
                            >
                                {/* Linha do tempo */}
                                {index < transfers.length - 1 && (
                                    <div className="absolute left-1/2 top-full w-0.5 h-8 bg-gradient-to-b from-primary-500/50 to-transparent transform -translate-x-1/2" />
                                )}
                                
                                {/* Card */}
                                <div className="flex justify-center">
                                    <TransferCard 
                                        transfer={transfer} 
                                        index={index}
                                        isTier1={transfer.tier === 'TIER_1'}
                                    />
                                </div>
                            </motion.div>
                        ))}
                    </AnimatePresence>
                </div>
            );

            // Renderização em modo Grid
            const renderGrid = () => (
                <motion.div
                    variants={containerVariants}
                    initial="hidden"
                    animate="visible"
                    className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
                >
                    <AnimatePresence>
                        {transfers.map((transfer, index) => (
                            <TransferCard 
                                key={transfer.id}
                                transfer={transfer} 
                                index={index}
                                isTier1={transfer.tier === 'TIER_1'}
                            />
                        ))}
                    </AnimatePresence>
                </motion.div>
            );

            if (loading && transfers.length === 0) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-2 border-primary-500 border-t-transparent mb-4"></div>
                            <p className="text-gray-400">Carregando transferências...</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <svg className="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                            </svg>
                            <p className="text-gray-400 mb-4">{error}</p>
                            <button 
                                onClick={fetchTransfers}
                                className="px-6 py-3 bg-primary-500 text-white rounded-lg hover:bg-primary-600 transition-colors"
                            >
                                Tentar novamente
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-background-950 p-6">
                    {/* Header */}
                    <motion.div
                        initial={{ opacity: 0, y: -20 }}
                        animate={{ opacity: 1, y: 0 }}
                        className="text-center mb-8"
                    >
                        <h1 className="text-4xl font-bold text-white mb-2 flex items-center justify-center space-x-3">
                            <svg className="w-8 h-8 text-accent-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                            </svg>
                            Mercado da Bola
                        </h1>
                        <p className="text-gray-400">
                            As transferências mais bombásticas do mercado brasileiro
                        </p>
                    </motion.div>

                    {/* Estatísticas */}
                    {stats && (
                        <motion.div
                            initial={{ opacity: 0, y: 20 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ delay: 0.2 }}
                            className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8"
                        >
                            <div className="glass-card-primary p-6 text-center">
                                <div className="text-3xl font-bold text-white mb-2">{stats.totalTransfers}</div>
                                <div className="text-gray-400 text-sm">Transferências</div>
                            </div>
                            
                            <div className="glass-card-accent p-6 text-center">
                                <div className="text-3xl font-bold text-white mb-2">{stats.totalSpent}</div>
                                <div className="text-gray-400 text-sm">Total Gasto</div>
                            </div>
                            
                            <div className="glass-card-secondary p-6 text-center">
                                <div className="text-3xl font-bold text-white mb-2">{stats.averageFee}</div>
                                <div className="text-gray-400 text-sm">Taxa Média</div>
                            </div>
                            
                            <div className="glass-card-primary p-6 text-center">
                                <div className="text-3xl font-bold text-white mb-2">{stats.mostActiveClubs[0]?.transfers || 0}</div>
                                <div className="text-gray-400 text-sm">{stats.mostActiveClubs[0]?.clubName || '-'}</div>
                            </div>
                        </motion.div>
                    )}

                    {/* Controles */}
                    <motion.div
                        initial={{ opacity: 0, y: 20 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ delay: 0.3 }}
                        className="flex justify-center mb-8 space-x-4"
                    >
                        <button
                            onClick={() => setViewMode('timeline')}
                            className={`px-6 py-3 rounded-lg transition-all ${
                                viewMode === 'timeline' 
                                    ? 'bg-primary-500 text-white' 
                                    : 'bg-white/10 text-gray-400 hover:bg-white/20'
                            }`}
                        >
                            Timeline
                        </button>
                        <button
                            onClick={() => setViewMode('grid')}
                            className={`px-6 py-3 rounded-lg transition-all ${
                                viewMode === 'grid' 
                                    ? 'bg-primary-500 text-white' 
                                    : 'bg-white/10 text-gray-400 hover:bg-white/20'
                            }`}
                        >
                            Grade
                        </button>
                    </motion.div>

                    {/* Lista de Transferências */}
                    <motion.div
                        initial={{ opacity: 0, y: 20 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ delay: 0.4 }}
                    >
                        {transfers.length === 0 ? (
                            <div className="text-center py-12">
                                <svg className="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                                </svg>
                                <p className="text-gray-400">Nenhuma transferência encontrada</p>
                            </div>
                        ) : (
                            viewMode === 'timeline' ? renderTimeline() : renderGrid()
                        )}
                    </motion.div>
                </div>
            );
        };

        // Mouse tracking para gradiente dinâmico
        useEffect(() => {
            const handleMouseMove = (e) => {
                const x = (e.clientX / window.innerWidth) * 100;
                const y = (e.clientY / window.innerHeight) * 100;
                
                const overlay = document.querySelector('.gradient-overlay');
                if (overlay) {
                    overlay.style.setProperty('--mouse-x', `${x}%`);
                    overlay.style.setProperty('--mouse-y', `${y}%`);
                }
            };
            
            window.addEventListener('mousemove', handleMouseMove);
            return () => window.removeEventListener('mousemove', handleMouseMove);
        }, []);

        // Renderizar aplicativo
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TransferMarket />);
    </script>
</body>
</html>
